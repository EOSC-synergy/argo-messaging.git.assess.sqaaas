config:
  credentials: []
  project_repos:
    github.com/ARGOeu/argo-messaging:
      branch: master
      repo: https://github.com/ARGOeu/argo-messaging.git
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/Ophidia
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/ARGOeu/argo-messaging git:
        commands:
        - /usr/bin/env sh .sqa/script.lanky-sangria-lemming.sh
        container: qc.acc_paltry-cream-havanese
  QC.Doc:
    repos:
      github.com/ARGOeu/argo-messaging find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.whiny-apricot-newfoundland.sh
        container: qc.doc_snazzy-gamboge-snail
      github.com/ARGOeu/argo-messaging git:
        commands:
        - /usr/bin/env sh .sqa/script.snazzy-coral-echidna.sh
        container: qc.doc_crabby-brass-bloodhound
      github.com/ARGOeu/argo-messaging markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.lovely-champagne-salamander.sh
        container: qc.doc_stealthy-persimmon-bullfrog
  QC.Lic:
    repos:
      github.com/ARGOeu/argo-messaging licensee:
        commands:
        - /usr/bin/env sh .sqa/script.thirsty-saffron-fossa.sh
        container: qc.lic_greasy-razzmatazz-beaver
  QC.Met:
    repos:
      github.com/ARGOeu/argo-messaging cff-converter-python:
        commands:
        - /usr/bin/env sh .sqa/script.gummy-heliotrope-tiger.sh
        container: qc.met_pasty-coral-dragonfly
      github.com/ARGOeu/argo-messaging validate_codemeta:
        commands:
        - /usr/bin/env sh .sqa/script.muzzy-magenta-gibbon.sh
        container: qc.met_scanty-vermilion-catfish
  QC.Sec:
    repos:
      github.com/ARGOeu/argo-messaging bandit:
        commands:
        - /usr/bin/env sh .sqa/script.seedy-salmon-dragonfly.sh
        container: qc.sec_sleazy-sapphire-turkey
      github.com/ARGOeu/argo-messaging gosec:
        commands:
        - /usr/bin/env sh .sqa/script.greasy-rose-sponge.sh
        container: qc.sec_sickly-yellow-turkey
  QC.Sty:
    repos:
      github.com/ARGOeu/argo-messaging flake8:
        commands:
        - /usr/bin/env sh .sqa/script.stinky-fuchsia-russel.sh
        container: qc.sty_tacky-ivory-paradise
      github.com/ARGOeu/argo-messaging jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.grumpy-purple-buffalo.sh
        container: qc.sty_wheezy-mauve-bordeaux
      github.com/ARGOeu/argo-messaging staticcheck:
        commands:
        - /usr/bin/env sh .sqa/script.stinky-violet-oyster.sh
        container: qc.sty_skinny-asparagus-rattlesnake
  QC.Uni:
    repos:
      github.com/ARGOeu/argo-messaging pytest:
        commands:
        - /usr/bin/env sh .sqa/script.slimy-magenta-bloodhound.sh
        container: qc.uni_beady-mauve-rhinoceros
  QC.Ver:
    repos:
      github.com/ARGOeu/argo-messaging get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.goopy-gamboge-chihuahua.sh
        container: qc.ver_lovely-crimson-armadillo
timeout: 5400
